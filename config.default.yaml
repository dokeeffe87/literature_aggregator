# lit-agg default configuration
# Override by placing a config at ~/.config/lit-agg/config.yaml

default_categories:
  - cs.AI
  - cs.LG
  - cs.CL

max_papers: 20
batch_size: 10

summarize_model: claude-sonnet-4-6
rank_model: claude-sonnet-4-6

# Optional: shell command that prints a fresh API key to stdout.
# Useful for auto-rotating keys, e.g.:
#   api_key_command: my-corp-tool get-api-key
# api_key_command:
